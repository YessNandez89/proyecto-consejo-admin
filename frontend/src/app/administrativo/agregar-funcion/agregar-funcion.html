<button routerLink="/funciones" class="btn-volver">
  ⬅ Volver
</button>

<h2>Agregar Nueva Función</h2>

<form (ngSubmit)="guardar()">

  <div class="form-group">

    <label>Función</label>

    <input
      type="text"
      [(ngModel)]="funcion"
      name="funcion"
      required
    >

  </div>

  <div class="form-group">

    <label>Responsable</label>

    <input
      type="text"
      [(ngModel)]="responsable"
      name="responsable"
      required
    >

  </div>

  <div class="form-group">

    <label>Fecha Límite</label>

    <input
      type="date"
      [(ngModel)]="fecha"
      name="fecha"
      required
    >

  </div>

  <div class="form-group">

    <label>Estado</label>

    <select
      [(ngModel)]="estado"
      name="estado"
    >

      <option>Pendiente</option>
      <option>Cumplido</option>
      <option>Vencido</option>

    </select>

  </div>

  <div class="form-group">

  <label>Prioridad</label>

  <select
    [(ngModel)]="prioridad"
    name="prioridad"
  >

    <option>Alta</option>
    <option>Media</option>
    <option>Baja</option>

  </select>

</div>


  <button type="submit" class="btn-guardar">
    Guardar
  </button>

</form>
